nodes:
  - id: replayer
    build: pip install -e ../
    path: dora-openarm-dataset-replayer
    env:
      # Specify a dataset path by environment variable
      # DATASET: "..."
    inputs:
      # Just to keep this node alive while this is replaying
      tick: dora/timer/secs/1
    outputs:
      - arm_right_action
      - arm_right_observation
      - arm_left_action
      - arm_left_observation
      - lifter_action
      - lifter_observation
      - camera_wrist_right
      - camera_wrist_left
      - camera_ceiling
      - camera_head_right
      - camera_head_left

  - id: mujoco
    build: pip install dora-openarm-mujoco
    path: dora-openarm-mujoco
    args: "--viewer"
    inputs:
      position_right: replayer/arm_right_action
      position_left: replayer/arm_left_action

  - id: plot-wrist-right
    build: pip install opencv-plot
    path: opencv-plot
    inputs:
      image: replayer/camera_wrist_right

  - id: plot-wrist-left
    build: pip install opencv-plot
    path: opencv-plot
    inputs:
      image: replayer/camera_wrist_left

  - id: plot-ceiling
    build: pip install opencv-plot
    path: opencv-plot
    inputs:
      image: replayer/camera_ceiling

  - id: plot-head-right
    build: pip install opencv-plot
    path: opencv-plot
    inputs:
      image: replayer/camera_head_right

  - id: plot-head-left
    build: pip install opencv-plot
    path: opencv-plot
    inputs:
      image: replayer/camera_head_left
